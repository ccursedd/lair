<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaliWeb Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000000;
  --surface:#000000;
  --surface2:#050505;
  --surface3:#080808;
  --border:#1a1a1a;
  --border2:#222;
  --text:#e8e8e8;
  --text2:#aaa;
  --text3:#666;
  --green:#39ff14;
  --green2:#00c851;
  --green3:#004d1a;
  --red:#ff3333;
  --red2:#cc0000;
  --yellow:#ffcc00;
  --blue:#4499ff;
  --cyan:#00ffff;
  --purple:#cc44ff;
  --orange:#ff8800;
  --pink:#ff44aa;
  --mono:'JetBrains Mono',monospace;
  --header:'Orbitron',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--mono)}
body{position:relative}

/* SCANLINE EFFECT */
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,0,0.015) 2px,rgba(0,255,0,0.015) 4px);
  pointer-events:none;
  z-index:9999;
  animation:scanmove 8s linear infinite;
}
@keyframes scanmove{0%{background-position:0 0}100%{background-position:0 100%}}

/* BACKGROUND */
#bg{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:#000;
  overflow:hidden;
}
.bg-grid{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background-image:linear-gradient(rgba(57,255,20,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(57,255,20,0.03) 1px,transparent 1px);
  background-size:40px 40px;
}

/* TOPBAR */
#topbar{
  position:fixed;top:0;left:0;right:0;height:44px;
  background:#000;
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 16px;
  z-index:1000;
  gap:16px;
}
#topbar-logo{
  font-family:var(--header);
  font-size:13px;font-weight:900;
  color:var(--green);
  letter-spacing:3px;
  text-transform:uppercase;
  text-shadow:0 0 10px rgba(57,255,20,0.5);
}
#topbar-logo span{color:var(--red);text-shadow:0 0 10px rgba(255,51,51,0.5)}
.topbar-sep{width:1px;height:20px;background:var(--border2)}
#topbar-status{display:flex;gap:12px;align-items:center;flex:1}
.status-item{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px;font-family:var(--mono)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.status-dot.red{background:var(--red);box-shadow:0 0 4px var(--red)}
.status-dot.yellow{background:var(--yellow);box-shadow:0 0 4px var(--yellow)}
#topbar-time{margin-left:auto;font-size:11px;color:var(--text3);font-family:var(--mono)}
.topbar-btn{
  background:transparent;border:1px solid var(--border2);
  color:var(--text2);font-size:10px;padding:4px 10px;
  cursor:pointer;font-family:var(--mono);letter-spacing:1px;
  transition:all 0.15s;border-radius:2px;
}
.topbar-btn:hover{border-color:var(--green);color:var(--green)}

/* DESKTOP */
#desktop{
  position:fixed;top:44px;left:0;right:0;bottom:32px;
  overflow:hidden;
}

/* TASKBAR */
#taskbar{
  position:fixed;bottom:0;left:0;right:0;height:32px;
  background:#000;
  border-top:1px solid var(--border2);
  display:flex;align-items:center;padding:0 8px;gap:4px;
  z-index:1000;
}
.task-item{
  font-size:10px;color:var(--text3);padding:3px 10px;
  border:1px solid transparent;cursor:pointer;
  transition:all 0.15s;font-family:var(--mono);letter-spacing:0.5px;
  border-radius:2px;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;
}
.task-item.active{border-color:var(--green);color:var(--green)}
.task-item:hover{border-color:var(--border2);color:var(--text)}
#taskbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.taskbar-info{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* WINDOW */
.window{
  position:absolute;
  background:#000;
  border:1px solid var(--border2);
  border-radius:4px;
  overflow:hidden;
  box-shadow:0 0 0 1px #111,0 20px 60px rgba(0,0,0,0.9),0 0 30px rgba(57,255,20,0.03);
  display:flex;flex-direction:column;
  min-width:300px;min-height:200px;
  transition:box-shadow 0.15s;
}
.window.focused{
  border-color:#2a2a2a;
  box-shadow:0 0 0 1px #1a1a1a,0 30px 80px rgba(0,0,0,0.95),0 0 40px rgba(57,255,20,0.06);
}
.window.minimized{display:none}

/* TITLEBAR */
.titlebar{
  height:32px;
  background:#050505;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;
  cursor:grab;user-select:none;flex-shrink:0;
  gap:8px;
}
.titlebar:active{cursor:grabbing}
.win-btns{display:flex;gap:6px}
.win-btn{
  width:12px;height:12px;border-radius:50%;cursor:pointer;
  border:none;outline:none;transition:filter 0.1s;
  flex-shrink:0;
}
.win-btn:hover{filter:brightness(1.3)}
.win-close{background:#ff5f56}
.win-min{background:#ffbd2e}
.win-max{background:#27c93f}
.win-title{
  font-size:11px;color:var(--text3);flex:1;text-align:center;
  font-family:var(--mono);letter-spacing:1px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* TERMINAL */
.term-container{
  flex:1;overflow:hidden;display:flex;flex-direction:column;
  background:#000;
}
.term-output{
  flex:1;overflow-y:auto;padding:8px 12px;
  font-family:var(--mono);font-size:13px;line-height:1.6;
  scroll-behavior:smooth;
}
.term-output::-webkit-scrollbar{width:4px}
.term-output::-webkit-scrollbar-track{background:#000}
.term-output::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:2px}
.term-output::-webkit-scrollbar-thumb:hover{background:#2a2a2a}
.term-input-row{
  display:flex;align-items:center;padding:6px 12px;
  border-top:1px solid var(--border);
  background:#000;flex-shrink:0;gap:0;
}
.term-prompt-label{
  font-family:var(--mono);font-size:13px;white-space:nowrap;flex-shrink:0;
}
.term-input{
  background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--mono);font-size:13px;
  flex:1;caret-color:var(--green);
}
.term-input::selection{background:rgba(57,255,20,0.2)}
.term-cursor{
  display:inline-block;width:8px;height:14px;
  background:var(--green);animation:blink 1s step-end infinite;
  vertical-align:text-bottom;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* OUTPUT LINES */
.line{display:block;word-break:break-all}
.line.cmd{color:var(--green)}
.line.out{color:var(--text)}
.line.err{color:var(--red)}
.line.warn{color:var(--yellow)}
.line.info{color:var(--cyan)}
.line.success{color:var(--green2)}
.line.muted{color:var(--text3)}
.line.prompt-echo{color:var(--green)}
.ansi-green{color:var(--green)}
.ansi-red{color:var(--red)}
.ansi-yellow{color:var(--yellow)}
.ansi-blue{color:var(--blue)}
.ansi-cyan{color:var(--cyan)}
.ansi-purple{color:var(--purple)}
.ansi-white{color:var(--text)}
.ansi-gray{color:var(--text3)}
.ansi-bold{font-weight:700}

/* RESIZE HANDLE */
.resize-handle{
  position:absolute;bottom:0;right:0;
  width:16px;height:16px;cursor:se-resize;
  background:transparent;
}
.resize-handle::after{
  content:'';position:absolute;bottom:3px;right:3px;
  width:8px;height:8px;
  border-right:2px solid var(--border2);
  border-bottom:2px solid var(--border2);
}

/* TABS */
.term-tabs{
  display:flex;align-items:center;
  border-bottom:1px solid var(--border);
  background:#000;padding:0 8px;gap:2px;flex-shrink:0;overflow-x:auto;
}
.term-tabs::-webkit-scrollbar{height:2px}
.term-tabs::-webkit-scrollbar-thumb{background:#1a1a1a}
.term-tab{
  font-size:11px;color:var(--text3);
  padding:5px 12px;cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all 0.15s;white-space:nowrap;
  font-family:var(--mono);letter-spacing:0.5px;
  display:flex;align-items:center;gap:6px;
}
.term-tab.active{color:var(--green);border-bottom-color:var(--green)}
.term-tab:hover:not(.active){color:var(--text2)}
.term-tab-close{
  width:14px;height:14px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--text3);
  background:transparent;border:none;cursor:pointer;
  transition:all 0.1s;
}
.term-tab-close:hover{background:#1a1a1a;color:var(--red)}
.term-tab-add{
  font-size:14px;color:var(--text3);
  background:transparent;border:none;cursor:pointer;
  padding:4px 8px;transition:all 0.1s;
}
.term-tab-add:hover{color:var(--green)}

/* LOADING */
.typing-indicator{
  display:inline-flex;gap:3px;align-items:center;padding:2px 0;
}
.typing-dot{
  width:4px;height:4px;border-radius:50%;
  background:var(--green);
  animation:tdot 1.2s infinite;
}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes tdot{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

/* FILE MANAGER WINDOW */
.file-manager{
  flex:1;overflow:hidden;display:flex;flex-direction:column;
  background:#000;font-family:var(--mono);font-size:12px;
}
.fm-toolbar{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;border-bottom:1px solid var(--border);
  background:#000;flex-shrink:0;
}
.fm-path{
  flex:1;background:#050505;border:1px solid var(--border2);
  color:var(--text);font-size:11px;padding:3px 8px;
  font-family:var(--mono);border-radius:2px;
}
.fm-btn{
  background:transparent;border:1px solid var(--border2);
  color:var(--text3);font-size:10px;padding:3px 8px;
  cursor:pointer;font-family:var(--mono);transition:all 0.1s;border-radius:2px;
}
.fm-btn:hover{border-color:var(--green);color:var(--green)}
.fm-content{flex:1;overflow-y:auto;padding:4px}
.fm-content::-webkit-scrollbar{width:4px}
.fm-content::-webkit-scrollbar-thumb{background:#1a1a1a}
.fm-item{
  display:flex;align-items:center;gap:8px;
  padding:4px 8px;cursor:pointer;border-radius:2px;
  transition:background 0.1s;
}
.fm-item:hover{background:#0a0a0a}
.fm-item.selected{background:#0d1a0d}
.fm-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.fm-name{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fm-name.dir{color:var(--blue)}
.fm-name.exec{color:var(--green)}
.fm-size{color:var(--text3);font-size:10px;min-width:50px;text-align:right}

/* CONTEXT MENU */
#ctx-menu{
  position:fixed;display:none;
  background:#050505;border:1px solid var(--border2);
  z-index:9000;padding:4px 0;min-width:160px;border-radius:3px;
  box-shadow:0 8px 24px rgba(0,0,0,0.8);
}
.ctx-item{
  padding:6px 16px;font-size:11px;color:var(--text2);
  cursor:pointer;transition:all 0.1s;font-family:var(--mono);
  letter-spacing:0.5px;
}
.ctx-item:hover{background:#0d0d0d;color:var(--green)}
.ctx-sep{height:1px;background:var(--border);margin:3px 0}
.ctx-item.danger:hover{color:var(--red)}

/* NOTIFICATION */
.notif{
  position:fixed;bottom:40px;right:16px;
  background:#050505;border:1px solid var(--border2);
  padding:10px 16px;font-size:11px;color:var(--text2);
  font-family:var(--mono);border-radius:3px;
  max-width:280px;z-index:9998;
  animation:notifIn 0.2s ease,notifOut 0.2s ease forwards;
  animation-delay:0s,2.8s;animation-fill-mode:forwards;
  border-left:3px solid var(--green);
}
@keyframes notifIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes notifOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}

/* MODAL */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7);z-index:5000;
  display:flex;align-items:center;justify-content:center;
}
.modal{
  background:#000;border:1px solid var(--border2);
  padding:24px;min-width:320px;max-width:500px;border-radius:4px;
  font-family:var(--mono);
}
.modal h3{font-size:13px;color:var(--green);margin-bottom:16px;letter-spacing:1px}
.modal p{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{
  background:transparent;border:1px solid var(--border2);
  color:var(--text2);font-size:11px;padding:6px 16px;
  cursor:pointer;font-family:var(--mono);transition:all 0.15s;border-radius:2px;
}
.modal-btn:hover{border-color:var(--green);color:var(--green)}
.modal-btn.primary{border-color:var(--green);color:var(--green)}
.modal-btn.primary:hover{background:rgba(57,255,20,0.1)}

/* HELP PANEL */
.help-content{flex:1;overflow-y:auto;padding:12px;font-family:var(--mono);font-size:12px;color:var(--text2)}
.help-content::-webkit-scrollbar{width:4px}
.help-content::-webkit-scrollbar-thumb{background:#1a1a1a}
.help-section{margin-bottom:16px}
.help-section h3{color:var(--green);font-size:11px;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
.help-cmd{color:var(--cyan)}
.help-desc{color:var(--text3)}

/* SPLASH */
#splash{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:#000;z-index:99999;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
}
#splash-logo{
  font-family:var(--header);font-size:32px;font-weight:900;
  color:var(--green);letter-spacing:8px;
  text-shadow:0 0 20px rgba(57,255,20,0.6);
  animation:glitch 3s infinite;
}
@keyframes glitch{
  0%,90%,100%{transform:none;text-shadow:0 0 20px rgba(57,255,20,0.6)}
  92%{transform:skew(-2deg);text-shadow:-2px 0 var(--red),2px 0 var(--cyan)}
  94%{transform:skew(1deg);text-shadow:2px 0 var(--red),-2px 0 var(--cyan)}
}
#splash-sub{font-size:11px;color:var(--text3);letter-spacing:4px;font-family:var(--mono)}
#splash-bar{width:300px;height:2px;background:#111;border-radius:1px;overflow:hidden}
#splash-prog{height:100%;background:var(--green);width:0;transition:width 0.05s;box-shadow:0 0 8px var(--green)}
#splash-status{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;min-height:14px}
</style>
</head>
<body>

<div id="splash">
  <div id="splash-logo">KALIWEB</div>
  <div id="splash-sub">BROWSER TERMINAL v2.0</div>
  <div id="splash-bar"><div id="splash-prog"></div></div>
  <div id="splash-status"></div>
</div>

<div id="bg"><div class="bg-grid"></div></div>

<div id="topbar">
  <div id="topbar-logo">Kali<span>Web</span></div>

  <div class="topbar-sep"></div>
  <div id="topbar-time"></div>
</div>

<div id="desktop"></div>

<div id="taskbar">
  <div id="taskbar-windows"></div>
  <div id="taskbar-right">

  </div>
</div>

<div id="ctx-menu">

  <div class="ctx-item" onclick="ctxAction('new-file-manager')">File Manager</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('clear-desktop')">Clear Desktop</div>
  <div class="ctx-item danger" onclick="ctxAction('close-all')">Close All</div>
</div>

function createWindow(opts){

  const w = opts.width||700;
  const h = opts.height||460;
  const maxX = window.innerWidth - w;
  const maxY = window.innerHeight - h - 76;
  const x = opts.x !== undefined ? opts.x : Math.max(0, Math.random()*Math.min(maxX,300)+20);
  const y = opts.y !== undefined ? opts.y : Math.max(0, Math.random()*Math.min(maxY,200)+20);

  const el = document.createElement('div');
  el.className = 'window focused';
  el.id = id;
  el.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${++winZIndex}`;

  el.innerHTML = `
    <div class="titlebar" id="tb-${id}">
      <div class="win-btns">
        <button class="win-btn win-close" onclick="closeWindow('${id}')"></button>
        <button class="win-btn win-min" onclick="minimizeWindow('${id}')"></button>
        <button class="win-btn win-max" onclick="maximizeWindow('${id}')"></button>
      </div>
      <div class="win-title">${opts.title||'Terminal'}</div>
    </div>
    <div id="content-${id}"></div>
    <div class="resize-handle" id="rh-${id}"></div>
  `;

  document.getElementById('desktop').appendChild(el);
  windows[id] = {el,title:opts.title,minimized:false,maxed:false,prevRect:null,type:opts.type||'terminal'};

  makeDraggable(id);
  makeResizable(id);
  el.addEventListener('mousedown',()=>focusWindow(id));

  addTaskbarItem(id, opts.title||'Terminal');
  focusWindow(id);
  return id;
}

function focusWindow(id){
  if(focusedWin && focusedWin!==id){
    const prev = document.getElementById(focusedWin);
    if(prev) prev.classList.remove('focused');
  }
  const el = document.getElementById(id);
  if(el){
    el.classList.add('focused');
    el.style.zIndex = ++winZIndex;
  }
  focusedWin = id;
  document.querySelectorAll('.task-item').forEach(t=>{
    t.classList.toggle('active', t.dataset.winId===id);
  });
}

function closeWindow(id){
  const el = document.getElementById(id);

  const ti = document.querySelector(`.task-item[data-win-id="${id}"]`);

  delete windows[id];

function minimizeWindow(id){

function maximizeWindow(id){
  const win = windows[id];
  const el = document.getElementById(id);
  if(!win||!el) return;
  if(win.maxed){
    const r = win.prevRect;
    Object.assign(el.style, {left:r.left,top:r.top,width:r.width,height:r.height});
    win.maxed = false;
  } else {
    win.prevRect = {left:el.style.left,top:el.style.top,width:el.style.width,height:el.style.height};
    Object.assign(el.style, {left:'0px',top:'0px',width:'100%',height:'calc(100vh - 76px)'});

function makeDraggable(id){
  const tb = document.getElementById('tb-'+id);
  const el = document.getElementById(id);
  if(!tb||!el) return;
  let dx=0,dy=0,startX=0,startY=0,dragging=false;
  tb.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('win-btn')) return;
    dragging=true;
    startX=e.clientX; startY=e.clientY;
    dx = el.offsetLeft; dy = el.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const nx = dx + (e.clientX - startX);
    const ny = dy + (e.clientY - startY);
    el.style.left = Math.max(-200,Math.min(window.innerWidth-100,nx))+'px';
    el.style.top = Math.max(0,Math.min(window.innerHeight-100,ny))+'px';
  });
  document.addEventListener('mouseup',()=>{ dragging=false; });
}

// === RESIZE ===
function makeResizable(id){
  const rh = document.getElementById('rh-'+id);
  const el = document.getElementById(id);
  if(!rh||!el) return;
  let resizing=false,sx=0,sy=0,sw=0,sh=0;
  rh.addEventListener('mousedown',e=>{
    resizing=true; sx=e.clientX; sy=e.clientY;
    sw=el.offsetWidth; sh=el.offsetHeight;
    e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('mousemove',e=>{
    if(!resizing) return;
    el.style.width = Math.max(300, sw+(e.clientX-sx))+'px';
    el.style.height = Math.max(200, sh+(e.clientY-sy))+'px';
  });
  document.addEventListener('mouseup',()=>{ resizing=false; });
}

  document.getElementById('tabel-'+tabId)?.remove();
  delete win.tabs[tabId];
  const remaining = Object.keys(win.tabs);
  if(win.activeTab === tabId && remaining.length > 0) switchTab(winId, remaining[remaining.length-1]);
}

// === KEY HANDLER ===
function handleKey(e, winId, tabId){
  const inp = document.getElementById('inp-'+tabId);
  const tab = windows[winId]?.tabs[tabId];
  if(!inp || !tab) return;

  if(e.key === 'Enter'){
    const cmd = inp.value.trim();
    inp.value = '';
    if(cmd){
      tab.history.unshift(cmd);
      tab.histIdx = -1;
      commandHistory.unshift(cmd);
    }
    const promptSnap = buildPromptHTML(tab.cwd);
    appendHTML(tabId, promptSnap + `<span class="ansi-white">${escHtml(cmd)}</span>`);
    if(cmd) executeCommand(winId, tabId, cmd);
    else appendLine(tabId,'');
    const prom = document.getElementById('prompt-'+tabId);
    if(prom) prom.innerHTML = buildPromptHTML(tab.cwd);
  }
  else if(e.key === 'ArrowUp'){
    e.preventDefault();
    if(tab.histIdx < tab.history.length-1){
      tab.histIdx++;
      inp.value = tab.history[tab.histIdx]||'';
    }
  }
  else if(e.key === 'ArrowDown'){
    e.preventDefault();
    if(tab.histIdx > 0){ tab.histIdx--; inp.value = tab.history[tab.histIdx]||''; }
    else if(tab.histIdx===0){ tab.histIdx=-1; inp.value=''; }
  }
  else if(e.key==='l' && e.ctrlKey){ e.preventDefault(); clearOutput(tabId); }
  else if(e.key==='c' && e.ctrlKey){ e.preventDefault(); appendHTML(tabId, buildPromptHTML(tab.cwd)+'<span class="ansi-white">^C</span>'); appendLine(tabId,''); }
  else if(e.key==='d' && e.ctrlKey){ e.preventDefault(); appendLine(tabId,'exit','warn'); closeTab(winId, tabId, {stopPropagation:()=>{}}); }
}

function handleTab(winId, tabId){
  const inp = document.getElementById('inp-'+tabId);
  const tab = windows[winId]?.tabs[tabId];
  if(!inp||!tab) return;
  const val = inp.value;
  const parts = val.split(' ');
  const last = parts[parts.length-1];
  if(!last) return;
  // autocomplete path
  const dirPath = last.includes('/') ? last.substring(0,last.lastIndexOf('/')+1) : tab.cwd+'/';
  const prefix = last.includes('/') ? last.substring(last.lastIndexOf('/')+1) : last;
  const absDir = resolvePath(tab.cwd, dirPath.endsWith('/')?dirPath:dirPath+'/');
  const matches = Object.keys(VFS).filter(k=>{
    if(!k.startsWith(absDir===''?'/':absDir)) return false;
    const rel = k.slice(absDir.length);
    return rel && !rel.includes('/') && rel.startsWith(prefix);
  }).map(k=>k.slice(absDir.length));
  if(matches.length===1){
    parts[parts.length-1] = (last.includes('/')?last.substring(0,last.lastIndexOf('/')+1):'')+matches[0]+(VFS[absDir+matches[0]]?.type==='dir'?'/':'');
    inp.value = parts.join(' ');
  } else if(matches.length>1){
    appendLine(tabId, matches.join('  '),'muted');
  }
}

// === PATH UTILS ===
function resolvePath(cwd, path){
  if(!path) return cwd;
  let parts;
  if(path.startsWith('/')) parts = path.split('/');
  else parts = [...cwd.split('/'), ...path.split('/')];
  const stack = [];
  for(const p of parts){
    if(!p||p==='.') continue;
    if(p==='..') stack.pop();
    else stack.push(p);
  }
  return '/'+stack.join('/');
}

function lsDir(path){
  const entries = [];
  const prefix = path==='/'?'/':path+'/';
  for(const k of Object.keys(VFS)){
    if(k===path) continue;
    if(k.startsWith(prefix)){
      const rel = k.slice(prefix.length);
      if(!rel.includes('/')) entries.push({name:rel,...VFS[k]});
    }
  }
  return entries;
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// === COMMAND EXECUTOR ===
async function executeCommand(winId, tabId, rawCmd){
  const win = windows[winId];
  if(!win) return;
  const tab = win.tabs[tabId];
  if(!tab) return;

  // Handle pipes (basic)
  const cmds = rawCmd.split('|').map(c=>c.trim());
  let inputData = null;
  for(const cmdStr of cmds){
    inputData = await runSingleCommand(winId, tabId, cmdStr, inputData, cmds.length > 1);
  }
}

async function runSingleCommand(winId, tabId, rawCmd, pipeInput, isPiped){
  const win = windows[winId];
  const tab = win?.tabs[tabId];
  if(!tab) return null;

  // Variable substitution
  let cmd = rawCmd.replace(/\$(\w+)/g,(m,v)=>tab.env[v]||m);

  // Redirect
  let outFile = null;
  let appendFile = null;
  if(cmd.includes('>>')){
    [cmd, appendFile] = cmd.split('>>').map(s=>s.trim());
  } else if(cmd.includes('>')){
    [cmd, outFile] = cmd.split('>').map(s=>s.trim());
  }

  const parts = cmd.trim().split(/\s+/);
  const command = parts[0];
  const args = parts.slice(1);

  let output = null;

  // BUILT-IN COMMANDS
  switch(command){
    case '': return null;
    case 'clear': case 'reset': clearOutput(tabId); return null;
    case 'exit': case 'logout':
      appendLine(tabId,'logout','warn');
      setTimeout(()=>closeTab(winId, tabId, {stopPropagation:()=>{}}), 300);
      return null;
    case 'echo':
      output = args.map(a=>a.replace(/"/g,'').replace(/'/g,'')).join(' ');
      if(!isPiped || outFile) appendLine(tabId, output||'');
      return output;
    case 'pwd':
      output = tab.cwd;
      if(!isPiped) appendLine(tabId, tab.cwd);
      return output;
    case 'whoami': case 'id':
      output = command==='id'?'uid=0(root) gid=0(root) groups=0(root)':'root';
      appendLine(tabId, output);
      return output;
    case 'hostname':
      output = 'kaliweb';
      appendLine(tabId, output);
      return output;
    case 'uname':
      if(args.includes('-a')) output='Linux kaliweb 6.1.0-kaliweb #1 SMP KaliWeb 6.1.0-1 x86_64 GNU/Linux';
      else if(args.includes('-r')) output='6.1.0-kaliweb';
      else if(args.includes('-m')) output='x86_64';
      else output='Linux';
      appendLine(tabId, output);
      return output;
    case 'date':
      output = new Date().toString();
      appendLine(tabId, output);
      return output;
    case 'uptime':
      output = new Date().toTimeString().split(' ')[0]+' up 2:37,  1 user,  load average: 0.08, 0.12, 0.09';
      appendLine(tabId, output);
      return output;
    case 'history':
      commandHistory.slice(0,50).forEach((c,i)=>appendLine(tabId,`  ${String(i+1).padStart(3)} ${c}`,'muted'));
      return null;
    case 'env': case 'printenv':
      Object.entries(tab.env).forEach(([k,v])=>appendLine(tabId,`${k}=${v}`,'muted'));
      return null;
    case 'export':
      args.forEach(a=>{ const [k,v]=a.split('='); if(k&&v!==undefined) tab.env[k]=v.replace(/^["']|["']$/g,''); });
      return null;
    case 'unset':
      args.forEach(a=>delete tab.env[a]);
      return null;
    case 'alias':
      appendHTML(tabId,`<span class="ansi-gray">alias ll='ls -la'\nalias la='ls -A'\nalias nmap='nmap'\nalias grep='grep --color=auto'</span>`);
      return null;
    case 'cd':{
      const target = args[0]||tab.env.HOME||'/root';
      const resolved = target==='~'?'/root':target==='-'?tab.env.OLDPWD||'/root':resolvePath(tab.cwd, target);

// === AI COMMAND ===
async function aiCommand(tabId, tab, cmd, pipeInput, ctx='terminal'){
  const stopTyping = showLoadingIndicator(tabId);
  try {
    const sysPrompt = `You are a Kali Linux terminal emulator. The user is running commands in a simulated Kali Linux environment.
Current directory: ${tab.cwd}
User: root
Hostname: kaliweb
OS: Kali Linux 2024.1

RULES:
- Output ONLY what the terminal would display, nothing else
- Be realistic and accurate for Kali Linux commands
- For security tools (nmap, sqlmap, nikto, etc.), produce realistic-looking simulated output
- For network scans, make up realistic IPs, ports, services
- For password crackers, show realistic progress and results
- Keep output concise but complete
- Use ANSI escape codes style output (plain text, no markdown)
- If it's a man page request, show a realistic man page
- Context: ${ctx}
${pipeInput?'Pipe input: '+pipeInput.slice(0,500):''}`;

    const resp = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:sysPrompt,
        messages:[{role:'user',content:`Command: ${cmd}`}]
      })
    });
    const data = await resp.json();
    stopTyping();
    const text = data.content?.find(b=>b.type==='text')?.text||'Command not found';
    text.split('\n').forEach(l=>appendLine(tabId,l,'muted'));
    return text;
  } catch(e){
    stopTyping();
    appendLine(tabId,`Error: ${e.message}`,'err');
    return null;
  }
}

// === LOADING INDICATOR ===
function showLoadingIndicator(tabId){
  const out = document.getElementById('out-'+tabId);
  if(!out) return ()=>{};
  const el = document.createElement('span');
  el.className = 'line out';
  el.innerHTML = '<span class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span>';
  el.id = 'loading-'+Date.now();
  out.appendChild(el);
  out.scrollTop = out.scrollHeight;
  return ()=>el.remove();
}

function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

  const stopTyping = showLoadingIndicator(tabId);

  appendHTML(tabId,`<span class="ansi-gray">Host is up (0.00${Math.floor(Math.random()*9)+1}2s latency).</span>`);
  if(args.some(a=>a==='-p-')) appendLine(tabId,'Not shown: 65529 closed tcp ports (reset)','muted');
  else appendLine(tabId,'Not shown: 997 closed tcp ports (reset)','muted');
  appendHTML(tabId,`<span class="ansi-green ansi-bold">PORT     STATE SERVICE${isV?'        VERSION':''}</span>`);
  const ports = [[22,'tcp','ssh','OpenSSH 8.9p1 Ubuntu 3ubuntu0.6'],[80,'tcp','http','Apache httpd 2.4.54'],[443,'tcp','https','Apache httpd 2.4.54'],[3306,'tcp','mysql','MySQL 8.0.35']];
  ports.forEach(([port,proto,svc,ver])=>{
    appendHTML(tabId,`<span class="ansi-white">${String(port+'/'+proto).padEnd(9)}</span><span class="ansi-green">open  </span><span class="ansi-cyan">${svc.padEnd(${isV?15:8})}</span>${isV?`<span class="ansi-yellow">${ver}</span>`:''}`);

}

// === GIT ===
async function handleGit(winId, tabId, tab, args){
  const sub = args[0];
  switch(sub){
    case 'clone':{
      const url = args[1];
      if(!url){ appendLine(tabId,'usage: git clone <url>','err'); return; }
      const repoName = url.split('/').pop().replace('.git','');
      const targetPath = resolvePath(tab.cwd, args[2]||repoName);
      appendHTML(tabId,`<span class="ansi-yellow">Cloning into '${repoName}'...</span>`);
      const stopTyping = showLoadingIndicator(tabId);
      await delay(1500);
      stopTyping();
      appendLine(tabId,'remote: Enumerating objects: 143, done.','muted');
      appendLine(tabId,'remote: Counting objects: 100% (143/143), done.','muted');
      appendLine(tabId,'remote: Compressing objects: 100% (89/89), done.','muted');
      appendLine(tabId,'Receiving objects: 100% (143/143), 284.72 KiB | 2.84 MiB/s, done.','muted');
      appendLine(tabId,'Resolving deltas: 100% (67/67), done.','muted');
      VFS[targetPath]={type:'dir'};
      VFS[targetPath+'/.git']={type:'dir'};
      VFS[targetPath+'/README.md']={type:'file',content:`# ${repoName}\n\nCloned from ${url}\n`,size:100};
      gitRepos[targetPath]={url,branch:'main',log:[{hash:'abc1234',msg:'Initial commit',author:'Author',date:new Date().toISOString()}]};
      appendLine(tabId,'','muted');
      return;
    }
    case 'init':{
      VFS[tab.cwd+'/.git']={type:'dir'};
      gitRepos[tab.cwd]={url:null,branch:'main',log:[],staged:[],modified:[]};
      appendLine(tabId,`Initialized empty Git repository in ${tab.cwd}/.git/`,'success');
      return;
    }
    case 'status':{
      const repo = gitRepos[tab.cwd]||gitRepos[Object.keys(gitRepos).find(k=>tab.cwd.startsWith(k))];
      if(!repo){ appendLine(tabId,'fatal: not a git repository (or any parent): .git','err'); return; }
      appendHTML(tabId,`<span class="ansi-green">On branch ${repo.branch||'main'}</span>`);
      appendHTML(tabId,`<span class="ansi-gray">nothing to commit, working tree clean</span>`);
      return;
    }
    case 'log':{
      const repo2 = gitRepos[tab.cwd]||gitRepos[Object.keys(gitRepos).find(k=>tab.cwd.startsWith(k))];
      if(!repo2){ appendLine(tabId,'fatal: not a git repository','err'); return; }
      if(!repo2.log?.length){ appendLine(tabId,'fatal: your current branch has no commits yet','err'); return; }
      repo2.log.forEach(entry=>{
        appendHTML(tabId,`<span class="ansi-yellow">commit ${entry.hash}${Array(33).fill('a').map(()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join('')}</span>`);
        appendLine(tabId,`Author: ${entry.author} <${entry.author.toLowerCase().replace(' ','.')}@example.com>`,'muted');
        appendLine(tabId,`Date:   ${entry.date}`,'muted');
        appendLine(tabId,'');
        appendLine(tabId,'    '+entry.msg,'muted');
        appendLine(tabId,'');
      });
      return;
    }
    case 'add': case 'commit': case 'push': case 'pull': case 'fetch':
    case 'branch': case 'checkout': case 'merge': case 'rebase':
    case 'stash': case 'tag': case 'diff': case 'show': case 'remote':
      await aiCommand(tabId, tab, 'git '+args.join(' '), null, 'git');
      return;
    default:
      await aiCommand(tabId, tab, 'git '+args.join(' '), null, 'git');
      return;
  }
}

  appendHTML(tabId,`<span class="ansi-red ansi-bold"> .888888888888888' </span>  <span style="background:#ff0000">  </span><span style="background:#ff8800">  </span><span style="background:#ffff00">  </span><span style="background:#00ff00">  </span><span style="background:#0000ff">  </span><span style="background:#ff00ff">  </span>`);
  appendHTML(tabId,`<span class="ansi-red ansi-bold">  '8888888888888'  </span>`);
}

// === BUILT-IN HELP ===

  const cmds = [
    ['FILE SYSTEM','ls, cd, pwd, cat, mkdir, rm, cp, mv, touch, find, chmod, ln, df, du, tar, zip, unzip'],

    ['DEVELOPMENT','python3, node, gcc, make, gdb, git, npm, pip'],
    ['TEXT','cat, grep, awk, sed, cut, tr, sort, uniq, wc, head, tail, less, more, nano, vim'],
    ['SYSTEM','uname, hostname, whoami, id, date, env, export, sudo, su, apt, systemctl, service'],
    ['CRYPTO','base64, md5sum, sha256sum, openssl, gpg, xxd'],

// === EDITOR ===
function openEditor(winId, tabId, filePath, editorName){
  const existingContent = VFS[filePath]?.content||'';
  const winId2 = createWindow({
    title:`${editorName} — ${filePath.split('/').pop()}`,
    width:680,height:500,type:'editor'
  });
  const content = document.getElementById('content-'+winId2);
  content.style.cssText = 'flex:1;display:flex;flex-direction:column;height:calc(100% - 32px)';
  content.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--border);background:#000;flex-shrink:0">
      <span style="font-size:10px;color:var(--text3);font-family:var(--mono);flex:1">${filePath}</span>
      <button onclick="saveEditorFile('${winId2}','${filePath}')" style="background:transparent;border:1px solid var(--border2);color:var(--green);font-size:10px;padding:3px 12px;cursor:pointer;font-family:var(--mono);border-radius:2px">SAVE</button>
      <button onclick="closeWindow('${winId2}')" style="background:transparent;border:1px solid var(--border2);color:var(--text3);font-size:10px;padding:3px 12px;cursor:pointer;font-family:var(--mono);border-radius:2px">CLOSE</button>
    </div>
    <textarea id="editor-ta-${winId2}" spellcheck="false" style="flex:1;background:#000;color:var(--text);font-family:var(--mono);font-size:13px;padding:12px;border:none;outline:none;resize:none;line-height:1.6;overflow-y:auto" wrap="off">${escHtml(existingContent)}</textarea>
    <div style="padding:4px 10px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);font-family:var(--mono)">${editorName.toUpperCase()} | ${filePath} | Ctrl+S: Save</div>
  `;
  const ta = document.getElementById('editor-ta-'+winId2);
  if(ta){
    ta.addEventListener('keydown', e=>{
      if(e.key==='s'&&e.ctrlKey){ e.preventDefault(); saveEditorFile(winId2, filePath); }
      if(e.key==='Tab'){ e.preventDefault(); const s=ta.selectionStart; ta.value=ta.value.substring(0,s)+'  '+ta.value.substring(ta.selectionEnd); ta.selectionStart=ta.selectionEnd=s+2; }
    });
    ta.focus();
  }
  appendLine(tabId,`Opened ${filePath} in ${editorName}`,'success');
}

function saveEditorFile(winId2, filePath){
  const ta = document.getElementById('editor-ta-'+winId2);
  if(!ta) return;
  VFS[filePath] = {type:'file', content:ta.value, size:ta.value.length};
  showNotif(`Saved: ${filePath.split('/').pop()}`);
}

// === MATRIX EFFECT ===
function startMatrixEffect(tabId){
  const out = document.getElementById('out-'+tabId);
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*(){}[]|<>?!~`';
  let count = 0;
  const interval = setInterval(()=>{
    if(count++ > 40){ clearInterval(interval); appendLine(tabId,''); return; }
    const line = Array.from({length:60},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
    appendHTML(tabId,`<span class="ansi-green" style="letter-spacing:2px">${line}</span>`);
    out.scrollTop = out.scrollHeight;
  }, 80);
}

// === FILE MANAGER ===
function newFileManager(){
  const id = createWindow({title:'File Manager',width:560,height:420,type:'filemanager'});
  const content = document.getElementById('content-'+id);
  content.style.cssText = 'flex:1;display:flex;flex-direction:column;height:calc(100% - 32px)';
  const fm = document.createElement('div');
  fm.className = 'file-manager';
  fm.id = 'fm-'+id;
  content.appendChild(fm);
  windows[id].fmCwd = '/root';
  renderFileManager(id, '/root');
}

function renderFileManager(winId, path){
  const fm = document.getElementById('fm-'+winId);
  if(!fm) return;
  windows[winId].fmCwd = path;
  const entries = [{name:'..',type:'dir'},...lsDir(path)];
  fm.innerHTML = `
    <div class="fm-toolbar">
      <button class="fm-btn" onclick="renderFileManager('${winId}','${path==='/'?'/':path.substring(0,path.lastIndexOf('/')||1)}')">↑</button>
      <input class="fm-path" value="${path}" id="fm-path-${winId}" onkeydown="if(event.key==='Enter'){renderFileManager('${winId}',document.getElementById('fm-path-${winId}').value)}" readonly>
      <button class="fm-btn" onclick="refreshFM('${winId}')">↻</button>
    </div>
    <div class="fm-content" id="fm-content-${winId}"></div>
    <div style="padding:4px 8px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);font-family:var(--mono)">${lsDir(path).length} items</div>
  `;
  const fc = document.getElementById('fm-content-'+winId);
  entries.forEach(entry=>{
    const isDir = entry.type==='dir';
    const item = document.createElement('div');
    item.className = 'fm-item';
    item.innerHTML = `<span class="fm-icon">${isDir?'📁':'📄'}</span><span class="fm-name ${isDir?'dir':entry.name.match(/\.(sh|py|pl|rb|exe)$/)?'exec':''}">${entry.name}</span><span class="fm-size">${isDir?'—':formatSize(entry.size||0)}</span>`;
    item.ondblclick = ()=>{
      if(isDir){
        const np = entry.name==='..'?path.substring(0,path.lastIndexOf('/')||1)||'/':path+'/'+entry.name;
        renderFileManager(winId, np);
      } else {
        openFilePreview(winId, path+'/'+entry.name, entry);
      }
    };
    item.oncontextmenu = (e)=>{ e.preventDefault(); showFmCtxMenu(e, winId, path, entry); };
    fc.appendChild(item);
  });
}

function refreshFM(winId){ renderFileManager(winId, windows[winId].fmCwd||'/root'); }
function formatSize(b){ if(b<1024) return b+'B'; if(b<1048576) return (b/1024).toFixed(1)+'K'; return (b/1048576).toFixed(1)+'M'; }

function openFilePreview(winId, path, entry){
  const pvId = createWindow({title:`Preview — ${entry.name}`,width:500,height:380,type:'preview'});
  const content = document.getElementById('content-'+pvId);
  content.style.cssText = 'flex:1;overflow-y:auto;padding:16px;font-family:var(--mono);font-size:12px;color:var(--text2);line-height:1.7;height:calc(100% - 32px)';
  content.textContent = VFS[path]?.content||'(empty file)';
}

function showFmCtxMenu(e, winId, path, entry){}

// === CONTEXT MENU ===
document.getElementById('desktop').addEventListener('contextmenu', e=>{ e.preventDefault(); const m=document.getElementById('ctx-menu'); m.style.display='block'; m.style.left=e.clientX+'px'; m.style.top=e.clientY+'px'; });
document.addEventListener('click', ()=>{ document.getElementById('ctx-menu').style.display='none'; });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') document.getElementById('ctx-menu').style.display='none'; });

function ctxAction(action){
  switch(action){
    case 'new-terminal': newTerminal(); break;
    case 'new-file-manager': newFileManager(); break;
    case 'clear-desktop': break;
    case 'close-all': Object.keys(windows).forEach(id=>closeWindow(id)); break;
  }
  document.getElementById('ctx-menu').style.display='none';
}

// === NOTIFICATIONS ===
function showNotif(msg, type='success'){
  const n = document.createElement('div');
  n.className = 'notif';
  if(type==='err') n.style.borderLeftColor='var(--red)';
  else if(type==='warn') n.style.borderLeftColor='var(--yellow)';
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(()=>n.remove(), 3200);
}

// Focus terminal when clicking desktop
document.getElementById('desktop').addEventListener('click', e=>{
  if(e.target.id==='desktop'){
    const wins = Object.entries(windows);
    if(wins.length){
      const last = wins.reduce((a,b)=>parseInt(document.getElementById(a[0])?.style.zIndex||0)>parseInt(document.getElementById(b[0])?.style.zIndex||0)?a:b);
      const inp = document.querySelector(`#${last[0]} .term-input`);
      if(inp) inp.focus();
    }
  }
});

// Keep terminal focused
document.addEventListener('keydown', e=>{
  const active = document.activeElement;
  if(active && (active.classList.contains('term-input')||active.tagName==='TEXTAREA')) return;
  if(e.key.length===1||e.key==='Backspace'||e.key==='Enter'){
    const inp = document.querySelector('.window.focused .term-input:not([style*="display: none"])');
    if(inp){ inp.focus(); }
  }
});
</script>
