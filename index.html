<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; font-family: 'JetBrains Mono', monospace; }

    #bg-video {
      position: fixed; inset: 0; z-index: 0;
      width: 100%; height: 100%; object-fit: cover;
      opacity: 0; transition: opacity 2s ease; pointer-events: none;
    }
    #bg-video.visible { opacity: 0.55; }

    #effect-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    .profile-wrap {
      margin-top: 16vh;
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 0;
      opacity: 0; transform: scale(0.92);
      animation: fadeUp 1.4s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes fadeUp { to { opacity: 1; transform: scale(1); } }

    .pfp-ring { position: relative; width: 110px; height: 110px; }
    .pfp {
      width: 110px; height: 110px; border-radius: 50%;
      object-fit: cover; display: block;
      border: 2px solid rgba(255,255,255,0.1);
      background: #111;
    }
    .status-dot {
      position: absolute; bottom: 5px; right: 5px;
      width: 16px; height: 16px; border-radius: 50%;
      border: 2.5px solid #000; background: #747f8d;
      transition: background 0.4s;
    }
    .status-dot.online  { background: #23a55a; }
    .status-dot.idle    { background: #f0b232; }
    .status-dot.dnd     { background: #f23f43; }

    .name-tagline { margin-top: 10px; text-align: center; }
    .name-text { font-size: 17px; font-weight: 500; color: rgba(255,255,255,0.85); letter-spacing: -0.01em; }
    .tagline-text { font-size: 11px; color: rgba(255,255,255,0.28); letter-spacing: 0.05em; margin-top: 2px; min-height: 14px; }

    .discord-card {
      margin-top: 14px;
      background: rgba(18,18,20,0.75);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 11px 16px 11px 14px;
      min-width: 240px; max-width: 290px; width: 88vw;
    }
    .dc-header { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
    .dc-header svg { opacity: 0.35; flex-shrink: 0; }
    .dc-label { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.05em; text-transform: lowercase; }
    .dc-username { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.85); margin-bottom: 6px; letter-spacing: -0.01em; }
    .status-row { display: flex; align-items: center; gap: 5px; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px;
      background: rgba(255,255,255,0.05);
      font-size: 10px; color: rgba(255,255,255,0.4);
    }
    .dot-tiny { width: 6px; height: 6px; border-radius: 50%; background: #747f8d; flex-shrink: 0; transition: background 0.4s; }
    .dot-tiny.online { background: #23a55a; }
    .dot-tiny.idle   { background: #f0b232; }
    .dot-tiny.dnd    { background: #f23f43; }
    .dc-activity {
      margin-top: 6px; font-size: 10px; color: rgba(255,255,255,0.28);
      letter-spacing: 0.01em; min-height: 13px; transition: all 0.3s;
    }

    .socials {
      margin-top: 20px;
      display: flex; gap: 12px; z-index: 10;
      opacity: 0; transform: translateY(8px);
      animation: fadeUp 1s 0.85s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .social-btn {
      width: 46px; height: 46px; border-radius: 12px;
      background: rgba(18,18,20,0.68);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none;
      transition: background 0.22s, border-color 0.22s, transform 0.22s;
    }
    .social-btn:hover { background: rgba(38,38,44,0.88); border-color: rgba(255,255,255,0.16); transform: translateY(-2px); }

    .player {
      position: fixed; bottom: 24px; right: 28px;
      align-items: flex-end; z-index: 20;
      display: flex; flex-direction: column; gap: 10px;
      opacity: 0; animation: fadeUp 1s 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .player-title-wrap { height: 22px; overflow: hidden; }
    .player-title-wrap canvas { display: block; }
    .player-controls { display: flex; align-items: center; gap: 14px; }
    .player-btn { background: none; border: none; cursor: pointer; padding: 2px; opacity: 0.18; transition: opacity 0.3s, transform 0.3s; }
    .player-btn:hover { opacity: 0.55; transform: translateY(-1px); }
    .player-btn canvas { display: block; }

    .enter-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #000; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: opacity 1.4s ease;
    }
  </style>
</head>

<script>
const DISCORD_ID = '1507165921989492919';

// ── Try multiple APIs in order, stop on first success ──
async function loadDiscordProfile() {
  const apis = [
    // 1. avatar-cyan — returns full profile info, no token
    async () => {
      const r = await fetch(`https://avatar-cyan.vercel.app/api/${DISCORD_ID}`);
      if (!r.ok) throw 0;
      const j = await r.json();
      return {
        username: j.display_name || j.username,
        avatar: j.avatarUrl,
      };
    },
    // 2. japi.rest
    async () => {
      const r = await fetch(`https://japi.rest/discord/v1/user/${DISCORD_ID}`);
      if (!r.ok) throw 0;
      const j = await r.json();
      const av = j.data?.avatar_url || (j.data?.avatar ? `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${j.data.avatar}.png?size=256` : null);
      return { username: j.data?.global_name || j.data?.username, avatar: av };
    },
    // 3. mesalytic
    async () => {
      const r = await fetch(`https://discordlookup.mesalytic.moe/v1/user/${DISCORD_ID}`);
      if (!r.ok) throw 0;
      const j = await r.json();
      const avId = j.avatar?.id;
      const av = avId ? `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${avId}.${avId.startsWith('a_')?'gif':'png'}?size=256` : null;
      return { username: j.global_name || j.username, avatar: av };
    },
    // 4. discordpfp.vercel.app (avatar only)
    async () => {
      const r = await fetch(`https://discordpfp.vercel.app/api/avatar?id=${DISCORD_ID}`);
      if (!r.ok) throw 0;
      const j = await r.json();
      return { username: null, avatar: j.avatar || j.url || j.avatarUrl };
    },
  ];

  for (const api of apis) {
    try {
      const result = await api();
      if (result.username) document.getElementById('dc-username').textContent = result.username;
      if (result.username) { document.getElementById('dc-displayname').textContent = result.username; }
      if (result.avatar)   { document.getElementById('pfp-img').src = result.avatar; }
      break;
    } catch(e) { /* try next */ }
  }
}

// ── Lanyard for live presence ──
async function loadPresence() {
  try {
    const r = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
    if (!r.ok) return;
    const { success, data } = await r.json();
    if (!success) return;

    // status dot
    const st = data.discord_status || 'offline';
    document.getElementById('status-dot').className = 'status-dot ' + (st !== 'offline' ? st : '');
    document.getElementById('dot-tiny').className = 'dot-tiny ' + (st !== 'offline' ? st : '');
    const lbl = { online:'online', idle:'idle', dnd:'do not disturb', offline:'offline' };
    document.getElementById('status-label').textContent = lbl[st] || 'offline';

    // avatar from lanyard if available
    if (data.discord_user?.avatar && !document.getElementById('pfp-img').src.includes('cdn.discordapp')) {
      const av = data.discord_user.avatar;
      document.getElementById('pfp-img').src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${av}.${av.startsWith('a_')?'gif':'png'}?size=256`;
    }
    // username
    const un = data.discord_user?.global_name || data.discord_user?.username;
    if (un) {
      document.getElementById('dc-username').textContent = un;
      document.getElementById('dc-displayname').textContent = un;
    }

    // activity / custom status
    let act = '';
    if (data.activities) {
      for (const a of data.activities) {
        if (a.type === 4 && a.state) { act = (a.emoji?.name ? a.emoji.name + ' ' : '') + a.state; break; }
      }
      if (!act) {
        for (const a of data.activities) {
          if (a.type !== 4 && a.name) { act = 'playing ' + a.name; break; }
        }
      }
    }
    document.getElementById('dc-activity').textContent = act;
    if (act) document.getElementById('dc-tagline').textContent = act.slice(0,36);

  } catch(e) {}
}

// run both; Lanyard also acts as a backup for avatar/username
loadDiscordProfile();
loadPresence();
setInterval(loadPresence, 25000);

// ── Sketchy utils ──
function sketchLine(c,x1,y1,x2,y2,j){const s=4+Math.floor(Math.random()*3);c.beginPath();c.moveTo(x1+(Math.random()-.5)*j,y1+(Math.random()-.5)*j);for(let i=1;i<=s;i++){const t=i/s;c.lineTo(x1+(x2-x1)*t+(Math.random()-.5)*j,y1+(y2-y1)*t+(Math.random()-.5)*j)}c.stroke()}

// ── Playlist ──
const playlist=[{title:'#SILKROAD',src:'/mev/tracks/%23SILKROAD.mp3'}];
let currentTrack=0,playing=false;
const playerAudio=document.getElementById('player-audio');
playerAudio.src=playlist[0].src; playerAudio.volume=0.45;
function loadTrack(i){currentTrack=((i%playlist.length)+playlist.length)%playlist.length;playerAudio.src=playlist[currentTrack].src;startTitleAnim()}
function togglePlay(){playing?playerAudio.pause():playerAudio.play().catch(()=>{});playing=!playing;drawPlayPause()}
function nextTrack(){loadTrack(currentTrack+1);playerAudio.play().catch(()=>{});playing=true;drawPlayPause()}
function prevTrack(){loadTrack(currentTrack-1);playerAudio.play().catch(()=>{});playing=true;drawPlayPause()}
playerAudio.addEventListener('ended',nextTrack);

// ── Title scroll ──
const tc=document.getElementById('player-title-canvas').getContext('2d');
const TW=250,TH=22,TF='14px "JetBrains Mono",monospace';
let ttw=0,ttext='',toff=0,tphase='pause-start',tlt=0,tpe=0,trf=0,tre=0;
function cBez(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function startTitleAnim(){ttext=playlist[currentTrack].title;tc.font=TF;ttw=Math.ceil(tc.measureText(ttext).width);toff=0;tphase='pause-start';tpe=0;tlt=0}
function drawTitle(now){
  if(!tlt)tlt=now;const dt=Math.min(now-tlt,50);tlt=now;
  if(ttw>TW){const ms=ttw-TW;if(tphase==='pause-start'){tpe+=dt;if(tpe>=1500)tphase='scroll'}else if(tphase==='scroll'){toff+=35*(dt/1000);if(toff>=ms){toff=ms;tphase='pause-end';tpe=0}}else if(tphase==='pause-end'){tpe+=dt;if(tpe>=1500){tphase='reset';trf=toff;tre=0}}else if(tphase==='reset'){tre+=dt;const t=Math.min(1,tre/800);toff=trf*(1-cBez(t));if(t>=1){toff=0;tphase='pause-start';tpe=0}}}
  tc.clearRect(0,0,TW,TH);tc.save();tc.beginPath();tc.rect(0,0,TW,TH);tc.clip();tc.font=TF;tc.textBaseline='middle';tc.fillStyle='rgba(255,255,255,0.35)';tc.fillText(ttext,ttw<=TW?TW-ttw-1:-toff,TH/2);tc.restore();requestAnimationFrame(drawTitle)
}
requestAnimationFrame(drawTitle);

// ── Player buttons ──
function drawPlayPause(j){const cv=document.getElementById('player-toggle').querySelector('canvas'),c=cv.getContext('2d'),s=44;j=j||1;c.clearRect(0,0,s,s);c.strokeStyle='#fff';c.lineWidth=1.5;c.lineCap='round';if(playing){sketchLine(c,s*.33,s*.22,s*.33,s*.78,j);sketchLine(c,s*.67,s*.22,s*.67,s*.78,j)}else{sketchLine(c,s*.28,s*.18,s*.28,s*.82,j);sketchLine(c,s*.28,s*.18,s*.78,s*.5,j);sketchLine(c,s*.78,s*.5,s*.28,s*.82,j)}}
function drawPrev(j){const cv=document.getElementById('player-prev').querySelector('canvas'),c=cv.getContext('2d'),s=40;j=j||1;c.clearRect(0,0,s,s);c.strokeStyle='#fff';c.lineWidth=1.4;c.lineCap='round';sketchLine(c,s*.55,s*.22,s*.28,s*.5,j);sketchLine(c,s*.28,s*.5,s*.55,s*.78,j);sketchLine(c,s*.72,s*.22,s*.45,s*.5,j);sketchLine(c,s*.45,s*.5,s*.72,s*.78,j)}
function drawNext(j){const cv=document.getElementById('player-next').querySelector('canvas'),c=cv.getContext('2d'),s=40;j=j||1;c.clearRect(0,0,s,s);c.strokeStyle='#fff';c.lineWidth=1.4;c.lineCap='round';sketchLine(c,s*.28,s*.22,s*.55,s*.5,j);sketchLine(c,s*.55,s*.5,s*.28,s*.78,j);sketchLine(c,s*.45,s*.22,s*.72,s*.5,j);sketchLine(c,s*.72,s*.5,s*.45,s*.78,j)}
drawPlayPause();drawPrev();drawNext();
document.getElementById('player-toggle').addEventListener('click',togglePlay);
document.getElementById('player-prev').addEventListener('click',prevTrack);
document.getElementById('player-next').addEventListener('click',nextTrack);
[{id:'player-prev',fn:drawPrev},{id:'player-toggle',fn:drawPlayPause},{id:'player-next',fn:drawNext}].forEach(({id,fn})=>{
  const el=document.getElementById(id);let iv=null;
  el.addEventListener('mouseenter',()=>{iv=setInterval(()=>fn(2.2),100)});
  el.addEventListener('mouseleave',()=>{clearInterval(iv);fn()});
});

// ── Enter overlay ──
const overlay=document.getElementById('enter-overlay');
const bgVideo=document.getElementById('bg-video');
const eCvs=document.getElementById('enter-text'),eCtx=eCvs.getContext('2d');
function drawEnterText(){eCtx.clearRect(0,0,280,20);eCtx.font='12px "JetBrains Mono",monospace';eCtx.textAlign='center';eCtx.textBaseline='middle';for(let p=0;p<3;p++){eCtx.fillStyle='rgba(255,255,255,'+(0.15+Math.random()*.06)+')';eCtx.fillText('click to enter',140+(Math.random()-.5)*1.2,10+(Math.random()-.5)*.8)}}
drawEnterText();const eJitter=setInterval(drawEnterText,120);
overlay.addEventListener('click',()=>{
  clearInterval(eJitter);overlay.style.opacity='0';overlay.style.pointerEvents='none';
  setTimeout(()=>overlay.remove(),1400);
  bgVideo.muted=false;bgVideo.volume=0.75;
  const vp=bgVideo.play();if(vp)vp.catch(()=>{bgVideo.muted=true;bgVideo.play().catch(()=>{})});
  setTimeout(()=>bgVideo.classList.add('visible'),80);
  playerAudio.volume=0;
  playerAudio.play().then(()=>{
    playing=true;drawPlayPause();startTitleAnim();
    const st=performance.now();
    (function tick(){const p=Math.min(1,(performance.now()-st)/3000);playerAudio.volume=p*p*.45;if(p<1)requestAnimationFrame(tick)})();
  }).catch(()=>{});
});

// ── Snow ──
const sc=document.getElementById('effect-canvas'),sctx=sc.getContext('2d');
function rsz(){sc.width=window.innerWidth;sc.height=window.innerHeight}
rsz();window.addEventListener('resize',rsz);
const flakes=[];
for(let i=0;i<120;i++)flakes.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:.5+Math.random()*2.5,speed:.3+Math.random(),wind:(Math.random()-.5)*.3,sway:Math.random()*Math.PI*2,swaySpeed:.005+Math.random()*.01,swayAmp:.3+Math.random()*.6,alpha:.07+Math.random()*.16});
function drawSnow(){const W=sc.width,H=sc.height;sctx.clearRect(0,0,W,H);for(const f of flakes){f.y+=f.speed;f.sway+=f.swaySpeed;f.x+=f.wind+Math.sin(f.sway)*f.swayAmp*.3;if(f.y>H+5){f.y=-5;f.x=Math.random()*W}if(f.x>W+5)f.x=-5;if(f.x<-5)f.x=W+5;sctx.globalAlpha=f.alpha;sctx.fillStyle='#fff';sctx.font=`${f.r*5}px monospace`;sctx.textAlign='center';sctx.textBaseline='middle';sctx.fillText('*',f.x,f.y)}requestAnimationFrame(drawSnow)}
sc.style.opacity='0';sc.style.transition='opacity 2s ease';
setTimeout(()=>{sc.style.opacity='1';drawSnow()},600);

// ── Cursor ──
;(function(){const SZ=32,PX=2,cv=document.createElement('canvas');cv.width=SZ;cv.height=SZ;const cx=cv.getContext('2d');const cr=['.......#.......','.......'+'#'+'.......','.......'+'#'+'.......','.......'+'#'+'.......','.......'+'#'+'.......','.......'+'#'+'.......','.......'+'#'+'.......','.......'+'#'+'.......','.......'+'#'+'.......','.......'+'#'+'.......','....#######....','.......'+'#'+'.......','.......'+'#'+'.......','.......'+'#'+'.......','.......'+'#'+'.......'];function df(f){cx.clearRect(0,0,SZ,SZ);const p=.7+.2*Math.sin(f*Math.PI/2);for(let y=0;y<15;y++)for(let x=0;x<15;x++)if(cr[y]&&cr[y][x]==='#'){cx.fillStyle='rgba(0,0,0,.7)';cx.fillRect(x*PX-1,y*PX,PX+2,PX+2);cx.fillRect(x*PX,y*PX-1,PX+2,PX+2)};for(let y=0;y<15;y++)for(let x=0;x<15;x++)if(cr[y]&&cr[y][x]==='#'){cx.fillStyle='rgba(255,255,255,'+p+')';cx.fillRect(x*PX+1,y*PX+1,PX,PX)};return cv.toDataURL('image/png')}const fs=[];for(let i=0;i<4;i++)fs.push(df(i));let cur=0;function ap(){document.body.style.cursor='url('+fs[cur]+') 15 21, crosshair';cur=(cur+1)%4}ap();setInterval(ap,250);})();

// ── Sparkle trail ──
;(function(){const N=50;let smx=400,smy=300,osmx=400,osmy=300;const stars=[],tiny=[],sv=[],tv=[],ssx=[],ssy=[],ttx=[],tty=[];function mkDiv(w,h){const d=document.createElement('div');d.style.cssText=`position:absolute;width:${w}px;height:${h}px;overflow:hidden;pointer-events:none`;return d}for(let i=0;i<N;i++){const t=mkDiv(3,3);t.style.visibility='hidden';t.style.zIndex='9999';document.body.appendChild(t);tiny.push(t);sv[i]=0;tv[i]=0;const s=mkDiv(5,5);s.style.cssText+=';background:transparent;visibility:hidden;z-index:9999';const h=mkDiv(5,1),v=mkDiv(1,5);h.style.cssText+='top:2px;left:0';v.style.cssText+='top:0;left:2px';s.appendChild(h);s.appendChild(v);document.body.appendChild(s);stars.push(s)}document.addEventListener('mousemove',e=>{smx=e.pageX;smy=e.pageY});function sparkle(){if(Math.abs(smx-osmx)>1||Math.abs(smy-osmy)>1){osmx=smx;osmy=smy;for(let i=0;i<N;i++){if(!sv[i]){stars[i].style.left=(ssx[i]=smx)+'px';stars[i].style.top=(ssy[i]=smy)+'px';stars[i].style.clip='rect(0px,5px,5px,0px)';stars[i].childNodes[0].style.backgroundColor='white';stars[i].childNodes[1].style.backgroundColor='white';stars[i].style.visibility='visible';sv[i]=50;break}}}for(let i=0;i<N;i++){if(sv[i])uStar(i);if(tv[i])uTiny(i)}setTimeout(sparkle,40)}function uStar(i){if(--sv[i]===25)stars[i].style.clip='rect(1px,4px,4px,1px)';if(sv[i]){ssy[i]+=1+Math.random()*3;ssx[i]+=(i%5-2)/5;if(ssy[i]<document.documentElement.scrollHeight){stars[i].style.top=ssy[i]+'px';stars[i].style.left=ssx[i]+'px'}else{stars[i].style.visibility='hidden';sv[i]=0;return}}else{tv[i]=50;tiny[i].style.top=(tty[i]=ssy[i])+'px';tiny[i].style.left=(ttx[i]=ssx[i])+'px';tiny[i].style.width='2px';tiny[i].style.height='2px';tiny[i].style.backgroundColor='white';stars[i].style.visibility='hidden';tiny[i].style.visibility='visible'}}function uTiny(i){if(--tv[i]===25){tiny[i].style.width='1px';tiny[i].style.height='1px'}if(tv[i]){tty[i]+=1+Math.random()*3;ttx[i]+=(i%5-2)/5;if(tty[i]<document.documentElement.scrollHeight){tiny[i].style.top=tty[i]+'px';tiny[i].style.left=ttx[i]+'px'}else{tiny[i].style.visibility='hidden';tv[i]=0;return}}else tiny[i].style.visibility='hidden'}sparkle();})();

// ── Social click transitions ──
document.querySelectorAll('.social-btn').forEach(el=>{
  const href=el.getAttribute('href');
  if(href&&href!=='#'){el.addEventListener('click',e=>{e.preventDefault();document.body.style.transition='transform .7s cubic-bezier(.7,0,.84,0),opacity .7s ease';document.body.style.transform='translateY(30%)';document.body.style.opacity='0';setTimeout(()=>{window.top.location.href=href},700)})}
});
</script>
